name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-and-sanity:
    name: Unit, syntax and sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Unit tests
        run: npm test

      - name: Syntax check
        run: npm run syntax-check

      - name: Sanity report check
        run: npm run sanity:check

      - name: Git whitespace check
        run: git diff --check

  desktop-smoke:
    name: Desktop Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Desktop smoke
        run: npm run smoke:desktop

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: .playwright-mcp/test-results
          if-no-files-found: ignore
