name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-and-sanity:
    name: Unit, syntax and sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Unit tests
        run: npm test

      - name: Syntax check
        run: npm run syntax-check

      - name: Sanity report check
        run: npm run sanity:check

      - name: Provider freshness report check
        run: npm run prices:freshness:check

      - name: Quantity logic audit check
        run: npm run quantity:audit:check

      - name: Pages artifact check
        run: npm run pages:build

      - name: Git whitespace check
        run: git diff --check

  desktop-smoke:
    name: Desktop Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browser
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          for a in 1 2 3; do
            timeout 240 npx playwright install --with-deps chromium && exit 0
            echo "::warning::install attempt $a failed/timed out, retry"
            sleep 5
          done
          echo "::error::install failed after 3 attempts"
          exit 1

      - name: Desktop smoke
        run: npm run smoke:desktop

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: .playwright-mcp/test-results
          if-no-files-found: ignore
